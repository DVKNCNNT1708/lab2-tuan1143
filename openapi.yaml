openapi: 3.1.0

info:
  title: Smart Campus Access Gate API
  version: 1.0.0
  description: |
    OpenAPI contract cho Access Gate Service trong Smart Campus.
    Service cung cấp API quản lý cổng ra vào và access log.
  contact:
    name: Access Gate Team
    email: access-gate@campus.local

servers:
  - url: http://localhost:4010
    description: Prism mock server

  - url: https://api.campus.local
    description: Smart Campus network

tags:
  - name: health
    description: Kiểm tra trạng thái service

  - name: gates
    description: Quản lý cổng ra vào

  - name: access-logs
    description: Nhật ký quẹt thẻ

  - name: events
    description: Event liên quan đến Access Gate

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Endpoint kiểm tra trạng thái hoạt động của Access Gate Service.

      tags:
        - health

      security: []

      responses:
        '200':
          description: Service healthy

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

              examples:
                ok:
                  value:
                    status: ok
                    service: access-gate-service
                    time: '2026-05-17T08:00:00Z'

  /gates:
    get:
      operationId: listGates
      summary: Get all gates
      description: Trả danh sách toàn bộ cổng trong Smart Campus.

      tags:
        - gates

      responses:
        '200':
          description: Gate list

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: '#/components/schemas/Gate'

              examples:
                gateList:
                  value:
                    - gateId: GATE-01
                      gateName: Main Entrance
                      location: Building A

                    - gateId: GATE-02
                      gateName: Parking Entrance
                      location: Basement B1

        '401':
          $ref: '#/components/responses/Unauthorized'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Get gate status
      description: Lấy trạng thái realtime của một cổng cụ thể.

      tags:
        - gates

      parameters:
        - name: gateId
          in: path
          required: true
          description: Mã cổng cần kiểm tra.

          schema:
            type: string
            pattern: '^GATE-[0-9]{2}$'

      responses:
        '200':
          description: Gate status

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'

              examples:
                opened:
                  value:
                    gateId: GATE-01
                    status: OPEN

        '401':
          $ref: '#/components/responses/Unauthorized'

        '404':
          $ref: '#/components/responses/NotFound'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /access-logs/recent:
    get:
      operationId: getRecentAccessLogs
      summary: Get recent access logs
      description: Trả danh sách access log gần đây.

      tags:
        - access-logs

      parameters:
        - name: limit
          in: query
          required: false
          description: Số lượng log tối đa cần lấy.

          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

      responses:
        '200':
          description: Recent access logs

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: '#/components/schemas/AccessLog'

              examples:
                recentLogs:
                  value:
                    - cardId: RFID-2026-001
                      gateId: GATE-01
                      result: ALLOW
                      userName: Nguyen Van A
                      accessTime: '2026-05-17T08:10:00Z'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /access-logs:
    post:
      operationId: createAccessLog
      summary: Create access log
      description: Ghi nhận access log mới từ thiết bị Access Gate.

      tags:
        - access-logs

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessLogRequest'

            examples:
              allowAccess:
                value:
                  cardId: RFID-2026-001
                  gateId: GATE-01
                  result: ALLOW

      responses:
        '201':
          description: Access log created

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLog'

              examples:
                created:
                  value:
                    cardId: RFID-2026-001
                    gateId: GATE-01
                    result: ALLOW
                    userName: Nguyen Van A
                    accessTime: '2026-05-17T08:10:00Z'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '422':
          $ref: '#/components/responses/UnprocessableEntity'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /events:
    post:
      operationId: createGateEvent
      summary: Create gate event
      description: Tạo event liên quan đến Access Gate.

      tags:
        - events

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GateEvent'

            examples:
              granted:
                value:
                  eventType: ACCESS_GRANTED
                  cardId: RFID-2026-001

              denied:
                value:
                  eventType: ACCESS_DENIED
                  reason: Invalid RFID card

      responses:
        '201':
          description: Event accepted

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '409':
          $ref: '#/components/responses/Conflict'

webhooks:
  accessGranted:
    post:
      operationId: onAccessGranted
      summary: Webhook khi truy cập được chấp nhận
      description: Provider gửi webhook khi có access được chấp nhận.

      tags:
        - events

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessGrantedEvent'

      responses:
        '200':
          description: Consumer received webhook

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false

      required:
        - status
        - service
        - time

      properties:
        status:
          type: string
          enum:
            - ok

        service:
          type: string
          minLength: 2
          maxLength: 80

        time:
          type: string
          format: date-time

    Gate:
      type: object
      additionalProperties: false

      required:
        - gateId
        - gateName
        - location

      properties:
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'

        gateName:
          type: string
          minLength: 2
          maxLength: 100

        location:
          type: string
          minLength: 2
          maxLength: 100

    GateStatus:
      type: object
      additionalProperties: false

      required:
        - gateId
        - status

      properties:
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'

        status:
          type: string
          enum:
            - OPEN
            - CLOSED
            - LOCKED

    CreateAccessLogRequest:
      type: object
      additionalProperties: false

      required:
        - cardId
        - gateId
        - result

      properties:
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'

        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'

        result:
          type: string
          enum:
            - ALLOW
            - DENY

    AccessLog:
      type: object
      additionalProperties: false

      required:
        - cardId
        - gateId
        - result
        - userName
        - accessTime

      properties:
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'

        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'

        result:
          type: string
          enum:
            - ALLOW
            - DENY

        userName:
          type:
            - string
            - "null"

        accessTime:
          type: string
          format: date-time

    GateEvent:
      oneOf:
        - $ref: '#/components/schemas/AccessGrantedEvent'
        - $ref: '#/components/schemas/AccessDeniedEvent'

      discriminator:
        propertyName: eventType

        mapping:
          ACCESS_GRANTED: '#/components/schemas/AccessGrantedEvent'
          ACCESS_DENIED: '#/components/schemas/AccessDeniedEvent'

    AccessGrantedEvent:
      type: object
      additionalProperties: false

      required:
        - eventType
        - cardId

      properties:
        eventType:
          type: string
          const: ACCESS_GRANTED

        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'

    AccessDeniedEvent:
      type: object
      additionalProperties: false

      required:
        - eventType
        - reason

      properties:
        eventType:
          type: string
          const: ACCESS_DENIED

        reason:
          type: string
          minLength: 3
          maxLength: 200

    EventAccepted:
      type: object
      additionalProperties: false

      required:
        - eventId
        - acceptedAt

      properties:
        eventId:
          type: string
          format: uuid

        acceptedAt:
          type: string
          format: date-time

    Problem:
      type: object
      additionalProperties: false

      required:
        - type
        - title
        - status

      properties:
        type:
          type: string
          format: uri

        title:
          type: string

        status:
          type: integer
          minimum: 400
          maximum: 599

        detail:
          type:
            - string
            - "null"

        instance:
          type:
            - string
            - "null"

        errors:
          type: array

          items:
            type: object
            additionalProperties: false

            required:
              - field
              - code
              - message

            properties:
              field:
                type: string

              code:
                type: string

              message:
                type: string

  responses:
    BadRequest:
      description: Invalid request

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Unauthorized request

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Business conflict

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Validation failed

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Internal server error

      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'